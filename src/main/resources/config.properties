# ─── API Client Configuration ─────────────────────────────────────────────────
# Base URL of the Spring Boot backend.  Must end with a trailing slash.
api.base.url=http://localhost:8081/

# HTTP read/write/connect timeout (seconds)
api.timeout.seconds=30

# Set to true to print all HTTP request/response bodies in the console.
# Should be false in production builds.
api.logging.enabled=true
