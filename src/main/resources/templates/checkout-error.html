<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(title='Erro | Área B2B', activePage='', content=~{::#main-content})}">
<body>
    <div id="main-content">
        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            
            <div class="w-24 h-24 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-6 shadow-sm border border-red-100">
                <i class="fa-solid fa-triangle-exclamation fa-3x"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-4">Ocorreu um erro ao processar a encomenda</h1>
            <p class="text-slate-500 max-w-lg mb-8">
                Não foi possível concluir a sua encomenda. Por favor tente novamente ou contacte o suporte.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                <a th:href="@{/carrinho}" class="btn btn-primary shadow-sm hover:shadow-md transition-shadow">
                    <i class="fa-solid fa-cart-shopping mr-2"></i> Voltar ao carrinho
                </a>
                <a th:href="@{/catalogo}" class="btn btn-ghost text-slate-600 hover:bg-slate-100">
                    <i class="fa-solid fa-book-open mr-2"></i> Ir para o catálogo
                </a>
            </div>
            
        </div>
    </div>
</body>
</html>
