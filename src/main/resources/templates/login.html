<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aplicação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl font-bold mb-4">Login</h2>
            <form action="/login" method="POST">
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text">Email</span>
                    </label>
                    <input type="email" name="email" placeholder="email@exemplo.com" class="input input-bordered w-full" required />
                </div>
                <div class="form-control w-full mt-4">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="********" class="input input-bordered w-full" required />
                </div>
                <div class="form-control mt-6">
                    <button type="submit" class="btn btn-primary w-full">Entrar</button>
                </div>
            </form>
            <div class="divider">OU</div>
            <div class="text-center">
                <a href="/" class="link link-hover text-sm">Voltar à página inicial</a>
            </div>
        </div>
    </div>
</body>
</html>
