<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(title=${produto.nome} + ' | Área B2B', activePage='catalogo', content=~{::#main-content})}">
<body>
    <div id="main-content">
        <div class="space-y-6">

            <!-- ══ BREADCRUMB / LINK DE RETORNO ════════════════════════════ -->
            <div>
                <a href="/catalogo"
                   class="inline-flex items-center gap-2 text-sm font-semibold text-blue-600 hover:text-blue-800 transition-colors group">
                    <i class="fa-solid fa-arrow-left text-xs group-hover:-translate-x-0.5 transition-transform"></i>
                    Voltar ao Catálogo
                </a>
            </div>

            <!-- ══ LAYOUT PRINCIPAL: DETALHE + PAINEL CARRINHO ══════════════ -->
            <div class="flex flex-col lg:flex-row gap-6 items-start">

                
                <div class="flex-1 min-w-0 space-y-6">

                    <!-- ── Cabeçalho do produto ───────────────────────────── -->
                    <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6">
                        <div class="flex flex-col sm:flex-row sm:items-start justify-between gap-4 pb-5 border-b border-slate-100 mb-6">
                            <div>
                                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight"
                                    th:text="${produto.nome}">Nome do Produto</h1>
                                <span class="text-xs font-mono text-slate-400 mt-1 block"
                                      th:text="${produto.codigoSku}">SKU</span>
                            </div>
                            <!-- Badge estado físico -->
                            <span th:with="label=${@enumDisplayHelper.getEstadoFisicoLabel(produto.estadoFisico)}"
                                  th:text="${label}"
                                  th:classappend="${produto.estadoFisico == 'LIQUIDO'} ? 'badge badge-info badge-outline' : 'badge badge-warning badge-outline'"
                                  class="badge badge-lg font-semibold shrink-0">—</span>
                        </div>

                        <!-- Grelha de campos de detalhe -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-5 text-sm">

                            <!-- Preço por kg -->
                            <div>
                                <p class="text-slate-400 font-semibold uppercase tracking-wider text-xs mb-1">Preço por kg</p>
                                <p class="font-bold text-slate-800 text-lg"
                                   th:text="${produto.precoPorKg != null ? #numbers.formatDecimal(produto.precoPorKg, 1, 2) + ' €' : '—'}">—</p>
                            </div>

                            <!-- Preço de Venda -->
                            <div>
                                <p class="text-slate-400 font-semibold uppercase tracking-wider text-xs mb-1">Preço de Venda</p>
                                <p class="font-semibold text-slate-800"
                                   th:text="${produto.precoVenda != null ? #numbers.formatDecimal(produto.precoVenda, 1, 2) + ' €' : '—'}">—</p>
                            </div>

                            <!-- Taxa de IVA -->
                            <div>
                                <p class="text-slate-400 font-semibold uppercase tracking-wider text-xs mb-1">Taxa de IVA</p>
                                <p class="font-semibold text-slate-800"
                                   th:text="${produto.taxaIva != null ? #numbers.formatDecimal(produto.taxaIva, 1, 0) + ' %' : '—'}">—</p>
                            </div>

                            <!-- Validade -->
                            <div>
                                <p class="text-slate-400 font-semibold uppercase tracking-wider text-xs mb-1">Validade</p>
                                <p class="font-semibold text-slate-800"
                                   th:text="${produto.validadeDias != null ? produto.validadeDias + ' dias' : '—'}">—</p>
                            </div>



                        </div>

                        <!-- Descrição -->
                        <div th:if="${produto.descricao != null and !produto.descricao.isEmpty()}"
                             class="mt-6 pt-5 border-t border-slate-100">
                            <p class="text-slate-400 font-semibold uppercase tracking-wider text-xs mb-2">Descrição</p>
                            <p class="text-slate-600 leading-relaxed" th:text="${produto.descricao}">—</p>
                        </div>
                    </div>



                </div><!-- /coluna esquerda -->

                <div class="w-full lg:w-80 shrink-0">
                    <div id="cart-panel"
                         class="sticky top-8 bg-white border border-slate-100 rounded-2xl shadow-sm p-6 space-y-5">

                        <!-- Título do painel -->
                        <div class="pb-4 border-b border-slate-100">
                            <h2 class="font-extrabold text-slate-900 text-lg flex items-center gap-2">
                                <i class="fa-solid fa-cart-plus text-blue-600"></i>
                                Adicionar ao Carrinho
                            </h2>
                            <p class="text-xs text-slate-400 mt-1">Seleccione o tipo de pallet e quantidade</p>
                        </div>

                        <!-- ── Formulário de adição ao carrinho ────────────── -->
                        <form th:action="@{/produto/{id}/adicionar-carrinho(id=${produto.id})}"
                              method="post"
                              id="form-carrinho"
                              class="space-y-4">

                            <!-- Hidden: nome do produto para o carrinho -->
                            <input type="hidden" name="produtoNome" th:value="${produto.nome}">

                            <!-- Seletor de tipo de pallet -->
                            <div>
                                <label for="pallet-select"
                                       class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                                    Tipo de Pallet
                                </label>

                                <!-- Sem pallets disponíveis -->
                                <p th:if="${palletTipos == null or palletTipos.isEmpty()}"
                                   class="text-sm text-slate-400 italic">
                                    Nenhum tipo de pallet disponível de momento.
                                </p>

                                <!-- Select de pallets -->
                                <div th:unless="${palletTipos == null or palletTipos.isEmpty()}">
                                    <select id="pallet-select"
                                            name="palletTipoId"
                                            required
                                            class="select select-bordered w-full bg-white border-slate-200 text-slate-700 font-medium text-sm"
                                            onchange="updatePalletNome(this)">
                                        <option value="" disabled selected>Seleccione um tipo...</option>
                                        <option th:each="pt : ${palletTipos}"
                                                th:value="${pt.id}"
                                                th:text="${pt.nome + (pt.capacidadeKg != null ? ' (' + #numbers.formatDecimal(pt.capacidadeKg, 1, 0) + ' kg)' : '')}"
                                                th:data-nome="${pt.nome}">
                                        </option>
                                    </select>
                                    <!-- Hidden: nome do pallet para apresentação no carrinho -->
                                    <input type="hidden" id="pallet-tipo-nome" name="palletTipoNome" value="">
                                </div>
                            </div>

                            <!-- Quantidade de pallets -->
                            <div>
                                <label for="quantidade"
                                       class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
                                    Quantidade de Pallets
                                </label>
                                <input id="quantidade"
                                       type="number"
                                       name="quantidadePallets"
                                       min="1"
                                       value="1"
                                       required
                                       class="input input-bordered w-full bg-white border-slate-200 text-slate-800 font-semibold text-sm">
                            </div>



                            <!-- Botão submeter -->
                            <button type="submit"
                                    id="btn-adicionar-carrinho"
                                    th:disabled="${palletTipos == null or palletTipos.isEmpty()}"
                                    class="btn w-full bg-blue-600 hover:bg-blue-700 text-white font-bold border-0 shadow-md hover:shadow-lg transition-all gap-2">
                                <i class="fa-solid fa-cart-plus"></i>
                                Adicionar ao Carrinho
                            </button>

                        </form>

                        <!-- Itens no carrinho -->
                        <div th:if="${carrinho != null and !carrinho.isEmpty()}"
                             class="pt-4 border-t border-slate-100">
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">No Carrinho</p>
                            <a href="/carrinho" class="flex items-center gap-2 group hover:text-blue-700 transition-colors cursor-pointer">
                                <i class="fa-solid fa-cart-shopping text-blue-500 group-hover:text-blue-600"></i>
                                <span class="font-bold text-slate-700 group-hover:text-blue-700 underline decoration-blue-200 underline-offset-2"
                                      th:text="${carrinho.totalItens()}">0</span>
                                <span class="text-sm text-slate-500 group-hover:text-slate-600">item(ns)</span>
                            </a>
                        </div>

                    </div>
                </div><!-- /coluna direita -->

            </div><!-- /layout principal -->

        </div>
    </div>
</body>

<script>
    // ── Sincronização do nome do pallet para o hidden input ───────────────────
    function updatePalletNome(selectEl) {
        const selectedOption = selectEl.options[selectEl.selectedIndex];
        const nomeInput = document.getElementById('pallet-tipo-nome');
        if (nomeInput && selectedOption) {
            nomeInput.value = selectedOption.dataset.nome || selectedOption.text;
        }
    }
</script>
</html>
