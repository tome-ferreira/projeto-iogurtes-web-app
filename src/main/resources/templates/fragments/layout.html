<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, activePage, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Norgurtes Portal B2B</title>
    <!-- Tailwind CSS & daisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS Customizado -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    keyframes: {
                        shimmer: {
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            },
            daisyui: {
                themes: ["light"],
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex">
    
    <!-- SIDEBAR (Desktop) -->
    <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col h-screen sticky top-0">
        <div class="p-6 border-b border-slate-100">
            <a class="flex items-center gap-2 font-extrabold text-2xl text-blue-700 tracking-tight" th:href="@{/}">
                <span>Norgurtes</span>
            </a>
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mt-2">Portal B2B</span>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="menu menu-md w-full px-4 gap-2 text-slate-600 font-medium">
                <li>
                    <a th:href="@{/client-area}" th:classappend="${activePage == 'dashboard'} ? 'bg-blue-50 text-blue-700 font-bold' : 'hover:bg-slate-50'">
                        <i class="fa-solid fa-chart-pie w-5"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a th:href="@{/catalogo}" th:classappend="${activePage == 'catalogo'} ? 'bg-blue-50 text-blue-700 font-bold' : 'hover:bg-slate-50'">
                        <i class="fa-solid fa-book-open w-5"></i> Catálogo
                    </a>
                </li>
                <li>
                    <a th:href="@{/encomendas}" th:classappend="${activePage == 'encomendas'} ? 'bg-blue-50 text-blue-700 font-bold' : 'hover:bg-slate-50'">
                        <i class="fa-solid fa-box-open w-5"></i> Encomendas
                    </a>
                </li>
                <li th:if="${session.carrinho != null and session.carrinho.totalItens() > 0}">
                    <a th:href="@{/carrinho}" th:classappend="${activePage == 'carrinho'} ? 'bg-blue-50 text-blue-700 font-bold' : 'hover:bg-slate-50 text-blue-600'">
                        <i class="fa-solid fa-cart-shopping w-5"></i> Carrinho
                        <span class="badge badge-sm badge-primary ml-auto" th:text="${session.carrinho.totalItens()}">0</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-slate-100">
            <a th:href="@{/}" class="btn btn-ghost w-full justify-start text-red-600 hover:bg-red-50 hover:text-red-700">
                <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Terminar Sessão
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-h-screen max-w-full overflow-hidden">
        
        <!-- MOBILE NAVBAR -->
        <div class="md:hidden navbar bg-white border-b border-slate-200 sticky top-0 z-50">
            <div class="navbar-start">
                <div class="dropdown">
                    <button tabindex="0" class="btn btn-ghost btn-circle">
                        <i class="fa-solid fa-bars text-xl text-slate-600"></i>
                    </button>
                    <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52 text-slate-700 font-medium border border-slate-100">
                        <li><a th:href="@{/client-area}" th:classappend="${activePage == 'dashboard'} ? 'bg-blue-50 text-blue-700 font-bold'">Dashboard</a></li>
                        <li><a th:href="@{/catalogo}" th:classappend="${activePage == 'catalogo'} ? 'bg-blue-50 text-blue-700 font-bold'">Catálogo</a></li>
                        <li><a th:href="@{/encomendas}" th:classappend="${activePage == 'encomendas'} ? 'bg-blue-50 text-blue-700 font-bold'">Encomendas</a></li>
                        <li th:if="${session.carrinho != null and session.carrinho.totalItens() > 0}">
                            <a th:href="@{/carrinho}" th:classappend="${activePage == 'carrinho'} ? 'bg-blue-50 text-blue-700 font-bold' : 'text-blue-600'">Carrinho
                                <span class="badge badge-xs badge-primary ml-auto" th:text="${session.carrinho.totalItens()}">0</span>
                            </a>
                        </li>
                        <li class="mt-2 pt-2 border-t border-slate-100"><a th:href="@{/}" class="text-red-600">Terminar Sessão</a></li>
                    </ul>
                </div>
            </div>
            <div class="navbar-center">
                <a class="font-extrabold text-xl text-blue-700 flex items-center gap-2" th:href="@{/}">
                    Norgurtes
                </a>
            </div>
            <div class="navbar-end">
                <button class="btn btn-ghost btn-circle">
                    <div class="indicator">
                        <i class="fa-solid fa-bell text-slate-500"></i>
                        <span class="badge badge-xs badge-error indicator-item"></span>
                    </div>
                </button>
            </div>
        </div>

        

        <!-- DYNAMIC CONTENT INJECTED HERE -->
        <div class="flex-1 p-6 md:p-8 lg:p-10 overflow-y-auto bg-slate-50 w-full">
            <div th:replace="${content}"></div>
        </div>
    </main>

</body>
</html>
