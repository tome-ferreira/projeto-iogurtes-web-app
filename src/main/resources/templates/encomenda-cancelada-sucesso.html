<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(title='Encomenda Cancelada | Área B2B', activePage='', content=~{::#main-content})}">
<body>
    <div id="main-content">
        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
            
            <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-6 shadow-sm border border-green-100">
                <i class="fa-solid fa-check fa-3x"></i>
            </div>
            
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-4">Encomenda cancelada com sucesso</h1>
            <p class="text-slate-500 max-w-lg mb-8">
                A sua encomenda foi cancelada. Se tiver alguma dúvida não hesite em contactar-nos.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                <a th:href="@{/encomendas}" class="btn btn-primary shadow-sm hover:shadow-md transition-shadow">
                    <i class="fa-solid fa-box-open mr-2"></i> Ver as minhas encomendas
                </a>
            </div>
            
        </div>
    </div>
</body>
</html>
