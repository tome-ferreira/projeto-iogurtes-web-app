<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(title='Dashboard | Área B2B', activePage='dashboard', content=~{::#main-content})}">
<body>
    <div id="main-content">
        <div class="space-y-8">
            <!-- Header Section / Boas-vindas -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Olá, Parceiro Norgurtes</h1>
                    <p class="text-slate-500 mt-1">Bem-vindo ao seu painel de gestão B2B.</p>
                </div>
                <a th:href="@{/catalogo}" class="btn btn-primary bg-blue-700 hover:bg-blue-800 text-white border-none shadow-lg shadow-blue-100/50">
                    <i class="fa-solid fa-plus mr-2"></i> Nova Encomenda
                </a>
            </div>

            <!-- Cards de Métricas (daisyUI stats) -->
            <div class="stats stats-vertical lg:stats-horizontal shadow-sm border border-slate-100 w-full bg-white rounded-2xl">
                
                <div class="stat">
                    <div class="stat-figure text-red-500 bg-red-50 p-3 rounded-xl">
                        <i class="fa-solid fa-xmark fa-xl"></i>
                    </div>
                    <div class="stat-title font-semibold text-slate-500">Encomendas Canceladas</div>
                    <div class="stat-value text-slate-800 text-4xl">0</div>
                    
                </div>
                
                <div class="stat">
                    <div class="stat-figure text-blue-500 bg-blue-50 p-3 rounded-xl">
                        <i class="fa-solid fa-truck-fast fa-xl"></i>
                    </div>
                    <div class="stat-title font-semibold text-slate-500">Encomendas Expedidas</div>
                    <div class="stat-value text-slate-800 text-4xl">0</div>
                    
                </div>
                
                <div class="stat">
                    <div class="stat-figure text-emerald-500 bg-emerald-50 p-3 rounded-xl">
                        <i class="fa-solid fa-check-double fa-xl"></i>
                    </div>
                    <div class="stat-title font-semibold text-slate-500">Encomendas Entregues</div>
                    <div class="stat-value text-slate-800 text-4xl">0</div>
                    
                </div>
                
            </div>

            
        </div>
    </div>
</body>
</html>
